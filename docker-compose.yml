services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  vectorsearch-api:
    build: ./src
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
    depends_on:
      - qdrant